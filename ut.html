                    const pOrder = { 'URGENTE': 0, 'ALTA': 1, 'MEDIA': 2, 'BASSA': 3 };
                    const sOrder = { 'IN_CORSO': 0, 'PRONTA': 1, 'BLOCCATA': 2 };

                    // 1. Priorità Commessa
                    const pDiff = (pOrder[cA?.priorita] || 2) - (pOrder[cB?.priorita] || 2);
                    if (pDiff !== 0) return pDiff;

                    // 2. Stato Task (prima quelle in corso, poi pronte)
                    const sDiff = (sOrder[a.stato] || 3) - (sOrder[b.stato] || 3);
                    if (sDiff !== 0) return sDiff;

                    // 3. Ordine cronologico
                    return a.ordine - b.ordine;

            avviaTimerSeNecessario(dipendenteId) {
                for (let c of this.state.commesse) {
                    const task = c.tasks.find(t => t.dipendenteId === dipendenteId && t.stato === 'IN_CORSO');
                    if (task) {
                        if (this.timerTask && this.timerTask.taskId === task.id) return;
                        if (this.timerTask) clearInterval(this.timerTask.interval);
                        const secondi = (task.tempoImpiegato || 0) * 60;
                        this.timerTask = {
                            taskId: task.id,
                            secondi: secondi,
                            secondiPausa: 0,
                            inPausa: false,
                            interval: setInterval(() => {
                                if (!this.timerTask.inPausa) {
                                    this.timerTask.secondi++;
                                } else {
                                    this.timerTask.secondiPausa++;
                                }
                                this.aggiornaTimerDisplay();
                            }, 1000)
                        };
                        break;
                    }
                }
                if (!this.timerGiornaliero) {
                    this.timerGiornaliero = {
                        dipendenteId: dipendenteId,
                        secondi: 0,
                        secondiPausa: 0,
                        inPausa: false,
                        interval: setInterval(() => {

                                this.timerGiornaliero.secondi++;
                            } else {
                                this.timerGiornaliero.secondiPausa++;
                            }

                    };

            aggiornaTimerDisplay() {
                const shiftTimerEl = document.getElementById('shift-timer');
                const globalPauseEl = document.getElementById('global-pause-timer');
                const massiveTimerEl = document.getElementById('massive-timer');
                const pausaLabel = document.getElementById('pausa-label');

                const format = (sec) => {
                    const h = Math.floor(sec / 3600);
                    const m = Math.floor((sec % 3600) / 60);
                    const s = sec % 60;
                    return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')} `;
                };

                if (shiftTimerEl && this.timerGiornaliero) {
                    shiftTimerEl.textContent = format(this.timerGiornaliero.secondi);
                }

                if (globalPauseEl && this.timerGiornaliero) {
                    globalPauseEl.textContent = format(this.timerGiornaliero.secondiPausa);
                }

                if (massiveTimerEl && this.timerTask) {
                    massiveTimerEl.textContent = this.timerTask.inPausa ? '⏸ IN PAUSA' : format(this.timerTask.secondi);
                    massiveTimerEl.style.color = this.timerTask.inPausa ? 'var(--warning)' : '';
                    massiveTimerEl.style.animation = this.timerTask.inPausa ? 'pulse 1.5s infinite ease-in-out' : 'none';

                if (pausaLabel && this.timerTask) {
                    pausaLabel.textContent = `⏸ Pausa Task: ${format(this.timerTask.secondiPausa)} `;
                    pausaLabel.style.color = this.timerTask.inPausa ? 'var(--warning)' : 'var(--text-muted)';

                            taskId: task.id,
                            secondi: 0,
                            secondiPausa: 0,
                            inPausa: false,
                            sessioniLog: [],

                            interval: setInterval(() => {
                                if (!this.timerTask.inPausa) {
                                    this.timerTask.secondi++;
                                } else {
                                    this.timerTask.secondiPausa++;
                                }
                                this.aggiornaTimerDisplay();
                            }, 1000)
                        };
                        this.salvaSuLocalStorage();
                        this.mostraNotifica('🚀 Task iniziata con successo!', 'success');

                        window.scrollTo({ top: 0, behavior: 'smooth' });

            },

            togglePausa() {
                if (!this.timerTask) return;
                this.timerTask.inPausa = !this.timerTask.inPausa;
                if (this.timerGiornaliero) this.timerGiornaliero.inPausa = this.timerTask.inPausa;

                const btn = document.getElementById('btn-pausa');
                if (btn) {
                    btn.innerHTML = this.timerTask.inPausa ? '<span style="font-size:1.5rem">▶</span> RIPRENDI LAVORO' : '<span style="font-size:1.5rem">⏸</span> PAUSA';
                    btn.style.background = this.timerTask.inPausa ? 'var(--warning-soft)' : '';
                    btn.style.borderColor = this.timerTask.inPausa ? 'var(--warning)' : '';
                    btn.style.color = this.timerTask.inPausa ? 'var(--warning)' : '';
                }
                const massiveTimer = document.getElementById('massive-timer');
                if (massiveTimer) {
                    massiveTimer.classList.toggle('active', !this.timerTask.inPausa);
                }
                this.mostraNotifica(this.timerTask.inPausa ? '⏸ Pausa avviata' : '▶ Lavoro ripreso', 'info');
            },

            // ==================== EXPORT EXCEL (formato gestionale originale) ====================
            exportDatiLavorazioni(filtroDip, dataInizio, dataFine) {
                try {
                    const righe = [];
                    const dipFiltro = filtroDip ? this.state.dipendenti.find(d => d.id === filtroDip) : null;

                    for (let c of this.state.commesse) {
                        for (let t of c.tasks) {
                            if (t.stato !== 'COMPLETATA') continue;
                            const dip = this.state.dipendenti.find(d => d.id === t.dipendenteId);
                            if (dipFiltro && dip?.id !== dipFiltro) continue;
                            const man = this.state.mansioni.find(m => m.id === t.mansioneId);
                            const dataTask = t.dataFine ? new Date(t.dataFine) : new Date();
                            if (dataInizio && dataTask < new Date(dataInizio)) continue;
                            if (dataFine && dataTask > new Date(dataFine + 'T23:59:59')) continue;
                            const minLordi = t.tempoImpiegato || 0;
                            const minPausa = t.minutiPausa || 0;
                            const minNetti = Math.max(0, minLordi - minPausa);
                            const hh = s => String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0') + ':00';
                            righe.push({
                                Commessa: c.codice,
                                Lavorazione: man ? man.nome : t.mansioneId,
                                Operatore: dip ? `${dip.cognome} ${dip.nome} ` : 'N/D',
                                Durata: hh(minNetti),
                                Data: dataTask.toLocaleDateString('it-IT'),
                                Note: t.note || '',
                                Pausa: minPausa > 0 ? 'X' : '-',
                                DurataPausa: minPausa > 0 ? hh(minPausa) : '-'
                            });
                        }
                    }

                    if (righe.length === 0) {
                        this.mostraNotifica('Nessun dato da esportare per i filtri selezionati', 'warning');
                        return;
                    }

                    // Costruisco CSV nel formato originale
                    const today = new Date().toLocaleDateString('it-IT');
                    let csv = 'DATI LAVORAZIONI\n\n';
                    csv += `Periodo, dal ${dataInizio || today} al ${dataFine || today} \n`;
                    if (dipFiltro) csv += `Operatore, ${dipFiltro.cognome} ${dipFiltro.nome} \n`;
                    csv += '\nCommessa,Lavorazione,Operatore,Durata,Data,Note,Pausa,DurataPausa\n';
                    righe.forEach(r => {
                        csv += `${r.Commessa},${r.Lavorazione},${r.Operatore},${r.Durata},${r.Data},${r.Note},${r.Pausa},${r.DurataPausa} \n`;
                    });

                    const ts = new Date().toISOString().replace(/[:\-T]/g, '').slice(0, 15);
                    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = `EsportaDati${ts}.csv`;
                    a.click(); URL.revokeObjectURL(url);
                    this.mostraNotifica(`✅ Esportate ${righe.length} righe`, 'success');
                } catch (e) {
                    console.error("Errore export:", e);
                    this.mostraNotifica("❌ Errore durante l'esportazione dei dati", "error");
                }
            },

            renderExport(container) {

                container.innerHTML = `
            < div class="animate-fade-up" >

            < div class="animate-fade-up" >

                        <div class="card" style="max-width: 800px; margin: 0 auto; padding: 40px;">
                            <div class="form-group" style="margin-bottom: 30px;">
                                <label class="form-label">Seleziona Commessa da Modificare</label>
                                <select id="commessaSelect" class="form-control" style="font-weight: 800; border-color: var(--primary);" onchange="app.caricaCommessaModifica(this.value)">
                                    <option value="">-- Seleziona --</option>
                                    ${this.state.commesse.map(c => `<option value="${c.id}">${c.codice} - ${c.articolo}</option>`).join('')}
                                </select>
                            </div>
                            <div id="modificaForm">
                                <div style="text-align: center; color: var(--text-muted); padding: 40px;">
                                    <div style="font-size: 3rem; margin-bottom: 20px;">📂</div>
                                    <p>Scegli una commessa per visualizzare i dettagli</p>
                                </div>
                            </div>
                        </div>
                    </div >
            `;
            },

            caricaCommessaModifica(commessaId) {
                const commessa = this.state.commesse.find(c => c.id === commessaId);
                const form = document.getElementById('modificaForm');
                if (!commessa) return;
                form.innerHTML = `
            < div class="animate-fade-in" style = "margin-top: 20px; border-top: 1px solid var(--border-light); padding-top: 30px;" >
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                            <h3 style="margin: 0; font-size: 1.5rem; font-weight: 900;">${commessa.codice}</h3>
                            <div class="badge badge-primary">${commessa.stato}</div>
                        </div>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
                            <div class="form-group">
                                <label class="form-label">Nuovo Stato</label>
                                <select id="nuovoStato" class="form-control">
                                    <option value="IN_CORSO" ${commessa.stato === 'IN_CORSO' ? 'selected' : ''}>🚀 IN CORSO</option>
                                    <option value="BLOCCATA" ${commessa.stato === 'BLOCCATA' ? 'selected' : ''}>🛑 BLOCCATA</option>
                                    <option value="COMPLETATA" ${commessa.stato === 'COMPLETATA' ? 'selected' : ''}>✅ COMPLETATA</option>
                                    <option value="ANNULLATA" ${commessa.stato === 'ANNULLATA' ? 'selected' : ''}>✖ ANNULLATA</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Priorità</label>
                                <select id="nuovaPriorita" class="form-control">
                                    <option value="MEDIA" ${commessa.priorita === 'MEDIA' ? 'selected' : ''}>Media</option>
                                    <option value="ALTA" ${commessa.priorita === 'ALTA' ? 'selected' : ''}>Alta</option>
                                    <option value="URGENTE" ${commessa.priorita === 'URGENTE' ? 'selected' : ''}>Urgente 🔥</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-group" style="margin-bottom: 30px;">
                            <label class="form-label">Note Aggiuntive</label>
                            <textarea id="noteCommessa" class="form-control" style="min-height: 100px;">${commessa.note || ''}</textarea>
                        </div>
                        
                        <button class="btn btn-primary" onclick="app.aggiornaStatoCommessa('${commessa.id}')" style="width: 100%; height: 50px; font-weight: 800;">AGGIORNA DATI COMMESSA</button>
                    </div >
            `;
            },

            aggiornaStatoCommessa(id) {
                const nuovoStato = document.getElementById('nuovoStato').value;
                const commessa = this.state.commesse.find(c => c.id === id);
                if (commessa) {
                    commessa.stato = nuovoStato;
                    this.salvaSuLocalStorage();
                    this.mostraNotifica('Stato aggiornato', 'success');
                    this.navigate('commesse');
                }
            },

            // ==================== TEMPLATE STANDARD ====================
            renderTemplate(container) {
                container.innerHTML = `
            < h2 class="section-title" >📋 Template Standard</h2 >
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
                    <div class="accordion-item">
                        <div class="accordion-header">Cancello Automatico</div>
                        <div class="accordion-content show">
                            <p>Template per cancelli automatici in ferro</p>
                            <button class="btn-small" onclick="app.usaTemplate('cancello')">Usa Template</button>
                        </div>
                    </div>
                    <div class="accordion-item">
                        <div class="accordion-header">Scala Antincendio</div>
                        <div class="accordion-content show">
                            <p>Template per scale antincendio in acciaio</p>
                            <button class="btn-small" onclick="app.usaTemplate('scala')">Usa Template</button>
                        </div>
                    </div>
                    <div class="accordion-item">
                        <div class="accordion-header">Ringhiera Design</div>
                        <div class="accordion-content show">
                            <p>Template per ringhiere in alluminio</p>
                            <button class="btn-small" onclick="app.usaTemplate('ringhiera')">Usa Template</button>
                        </div>
                    </div>
                </div>
        `;
            },

            usaTemplate(tipo) {
                let dati = {};
                if (tipo === 'cancello') {
                    dati = { articolo: 'Cancello Automatico', tasks: [{ mansioneId: 'MAN-001', dipendenteId: 'DIP-001', tempoStimato: 120 }, { mansioneId: 'MAN-002', dipendenteId: 'DIP-002', tempoStimato: 90 }] };
                } else if (tipo === 'scala') {
                    dati = { articolo: 'Scala Antincendio', tasks: [{ mansioneId: 'MAN-009', dipendenteId: 'DIP-007', tempoStimato: 240 }, { mansioneId: 'MAN-010', dipendenteId: 'DIP-003', tempoStimato: 180 }] };
                } else {
                    dati = { articolo: 'Ringhiera Design', tasks: [{ mansioneId: 'MAN-001', dipendenteId: 'DIP-004', tempoStimato: 100 }, { mansioneId: 'MAN-004', dipendenteId: 'DIP-005', tempoStimato: 45 }] };
                }
                this.navigate('nuova-commessa');
                setTimeout(() => {
                    document.getElementById('articolo').value = dati.articolo;
                }, 100);
                this.mostraNotifica('Template applicato, completa i dati', 'success');
            },

            avviaTimerGlobale() {
                let secondi = 0;
                setInterval(() => {
                    secondi++;
                    const h = Math.floor(secondi / 3600);
                    const m = Math.floor((secondi % 3600) / 60);
                    const s = secondi % 60;
                    document.getElementById('timer').textContent = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')} `;
                }, 1000);
            },

            mostraNotifiche() {
                const modal = document.createElement('div');
                modal.className = 'modal-backdrop';
                modal.id = 'notificheModal';
                modal.style.display = 'flex';

                const nonLette = this.state.notifiche.filter(n => !n.letta);

                modal.innerHTML = `
            < div class="modal-content" style = "max-width: 500px;" >
                        <div style="padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
                            <h3 style="margin: 0;">🔔 Centro Notifiche</h3>
                            <button onclick="document.getElementById('notificheModal').remove()" style="border: none; background: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
                        </div>
                        <div style="padding: 24px; max-height: 400px; overflow-y: auto;">
                            ${this.state.notifiche.length === 0 ? '<p style="text-align: center; color: var(--text-muted);">Nessuna notifica presente</p>' :
                        this.state.notifiche.sort((a, b) => b.timestamp - a.timestamp).map(n => `
                                <div style="padding: 16px; border-radius: 12px; background: ${n.letta ? 'var(--bg-body)' : 'var(--primary-soft)'}; margin-bottom: 12px; border: 1px solid ${n.letta ? 'var(--border)' : 'var(--primary)'}; position: relative;">
                                    <div style="font-weight: 700; margin-bottom: 4px;">${n.messaggio}</div>
                                    <div style="font-size: 0.75rem; color: var(--text-muted);">${new Date(n.timestamp).toLocaleString()}</div>
                                    ${!n.letta ? `<button onclick="app.risolviNotifica('${n.id}'); document.getElementById('notificheModal').remove(); app.mostraNotifiche();" style="margin-top: 10px; font-size: 0.7rem; color: var(--primary); background: none; border: 1px solid var(--primary); padding: 4px 8px; border-radius: 4px; cursor: pointer;">Segna come letta</button>` : ''}
                                </div>
                            `).join('')}
                        </div>
                        <div style="padding: 16px; border-top: 1px solid var(--border); text-align: center;">
                            <button class="btn btn-secondary btn-small" onclick="app.state.notifiche.forEach(n => n.letta = true); app.salvaSuLocalStorage(); document.getElementById('notificheModal').remove(); app.mostraNotifiche();">Segna tutte come lette</button>
                        </div>
                    </div >
                `;
                document.body.appendChild(modal);
            },

            toggleTheme() {
                const isDark = document.body.classList.toggle('dark-theme');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            },

            loadTheme() {
                const theme = localStorage.getItem('theme');
                if (theme === 'dark') {
                    document.body.classList.add('dark-theme');
                }
            }
        };

        window.app = app;
        window.addEventListener('DOMContentLoaded', () => {
            app.loadTheme();
            app.init();
        });
    </script>
</body>

</html>
