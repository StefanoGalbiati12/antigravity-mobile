            cambiaMansioneTask(select, idx) {
                const mansioneId = select.value;
                const container = select.parentElement.parentElement;
                const dipSelect = container.querySelector('.taskDipendente');
                const lavSelect = container.querySelector('.taskLavorazioni');
                dipSelect.innerHTML = '<option value="">Operatore qualificato...</option>';
                lavSelect.innerHTML = '';
                if (mansioneId) {
                    const mansione = this.state.mansioni.find(m => m.id === mansioneId);
                    const dipendentiQualificati = this.state.dipendenti.filter(d => d.mansioniId.includes(mansioneId));
                    dipendentiQualificati.forEach(d => {
                        const option = document.createElement('option');
                        option.value = d.id;
                        option.textContent = `${d.nome} ${d.cognome}`;
                        dipSelect.appendChild(option);
                    });

                    if (mansione && mansione.lavorazioni) {
                        for (let [cat, params] of Object.entries(mansione.lavorazioni)) {
                            const optGroup = document.createElement('optgroup');
                            optGroup.label = cat;
                            params.forEach(p => {
                                const opt = document.createElement('option');
                                opt.value = p;
                                opt.textContent = p;
                                optGroup.appendChild(opt);
                            });
                            lavSelect.appendChild(optGroup);
                        }
                    }

                    const tempoInput = container.querySelector('.taskTempo');
                    if (tempoInput && mansione.tempoMedio) tempoInput.value = mansione.tempoMedio;
                }
            },

            creaCommessa() {
                try {
                    const codice = document.getElementById('codice').value.trim();
                    const clienteId = document.getElementById('clienteId').value;
                    const articolo = document.getElementById('articolo').value.trim();
                    const descrizione = document.getElementById('descrizione').value.trim();
                    const dataConsegna = document.getElementById('dataConsegna').value;
                    const priorita = document.getElementById('priorita').value;

                    // 1. Validazione Campi Base
                    if (!clienteId) return this.mostraNotifica('⚠️ Seleziona un cliente', 'error');
                    if (!codice) return this.mostraNotifica('⚠️ Inserisci il codice commessa', 'error');
                    if (!articolo) return this.mostraNotifica('⚠️ Inserisci il nome articolo', 'error');
                    if (!dataConsegna) return this.mostraNotifica('⚠️ Seleziona una data di consegna', 'error');

                    // 2. Controllo Data nel passato
                    const oggi = new Date().toISOString().split('T')[0];
                    if (dataConsegna < oggi) {
                        return this.mostraNotifica('❌ La data di consegna non può essere nel passato', 'error');
                    }

                    const materiali = [];
                    const materialiRows = document.querySelectorAll('#materialiContainer > div');
                    for (let row of materialiRows) {
                        const select = row.querySelector('.materialeSelect');
                        const qtyInput = row.querySelector('.materialeQty');
                        const qty = parseFloat(qtyInput.value);

                        if (select.value) {
                            // 9.1 Validazioni Commessa - Quantità > 0
                            if (isNaN(qty) || qty <= 0) {
                                this.mostraNotifica('Errore: Quantità materiale deve essere > 0. Blocca salvataggio.', 'error');
                                return;
                            }

                            const mat = this.state.materiali.find(m => m.id === select.value);
                            if (mat) {
                                // 9.1 Validazioni Commessa - Materiale disponibile (Magazzino >= quantità)
                                if (mat.quantitaMagazzino < qty) {
                                    this.mostraNotifica(`Attenzione: Scorta insufficiente per ${mat.tipo}. Segnala riordino necessario.`, 'warning');
                                    // Non blocca il salvataggio come da specifica "Segnala riordino", ma noi decrementiamo se possibile o segnamo l'esigenza
                                }
                                materiali.push({ materialeId: select.value, quantita: qty });
                            }
                        }
                    }

                    // 9.1 Validazioni Commessa - Materiali obbligatori (Almeno 1)
                    if (materiali.length === 0) {
                        this.mostraNotifica('Errore: Almeno 1 materiale obbligatorio. Blocca salvataggio.', 'error');
                        return;
                    }

                    const tasks = [];
                    const taskRows = document.querySelectorAll('#tasksContainer > div');
                    for (let i = 0; i < taskRows.length; i++) {
                        const row = taskRows[i];
                        const mansioneId = row.querySelector('.taskMansione').value;
                        const dipendenteId = row.querySelector('.taskDipendente').value;
                        const lavorazioni = Array.from(row.querySelector('.taskLavorazioni').selectedOptions).map(o => o.value);
                        const tempoStimato = parseInt(row.querySelector('.taskTempo').value);

                        // 9.1 Validazioni Commessa - Task obbligatori
                        if (!mansioneId) {
                            this.mostraNotifica('Errore: Ogni task deve avere una mansione definita.', 'error');
                            return;
                        }
                        if (!dipendenteId) {
                            if (!confirm('Attenzione: Un task non ha un dipendente assegnato. Creare comunque?')) {
                                return;
                            }
                        }

                        // 9.2 Validazioni Task - Tempo > 0
                        if (isNaN(tempoStimato) || tempoStimato <= 0) {
                            this.mostraNotifica('Errore: Tempo stimato task deve essere > 0. Blocca salvataggio.', 'error');
                            return;
                        }

                        // 9.1 Validazioni Commessa - Mansione valida & Lavorazioni valide
                        const mansione = this.state.mansioni.find(m => m.id === mansioneId);
                        const dipendente = this.state.dipendenti.find(d => d.id === dipendenteId);

                        // 9.1 Mansione valida - Dipendente conosce mansione
                        if (dipendente && !dipendente.mansioniId.includes(mansioneId)) {
                            this.mostraNotifica(`⚠️ ${dipendente.nome} non ha la qualifica per ${mansione.nome}`, 'warning');
                            if (!confirm(`Il dipendente selezionato non è qualificato. Procedere comunque?`)) return;
                        }

                        // Overload Check
                        if (dipendente) {
                            const carico = dipendente.getCaricoLavoro(this.state.commesse);
                            if (carico >= 6) {
                                if (!confirm(`Attenzione: ${dipendente.nome} ha già ${carico} task attivi (limite consigliato: 6). Procedere?`)) {
                                    return;
                                }
                            }
                        }

                        tasks.push(new Task({
                            commessaId: 'temp',
                            ordine: i + 1,
                            mansioneId,
                            dipendenteId,
                            lavorazioniId: lavorazioni,
                            tempoStimato: tempoStimato,
                            // 9.2 Task sequenziale: Task n+1 attende Task n (Solo il primo è PRONTA)
                            stato: i === 0 ? 'PRONTA' : 'BLOCCATA'
                        }));
                    }

                    if (tasks.length === 0) {
                        this.mostraNotifica('Errore: Almeno 1 task obbligatorio. Blocca salvataggio.', 'error');
                        return;
                    }

                    // 9.3 Regole Magazzino - Decremento automatico quando commessa creata
                    materiali.forEach(m => {
                        const mat = this.state.materiali.find(item => item.id === m.materialeId);
                        if (mat) {
                            mat.quantitaMagazzino -= m.quantita;
                            // 9.3 Quantità minima raggiunta
                            if (mat.necessitaRiordino()) {
                                this.aggiungiNotifica(new Notifica({
                                    tipo: 'PROBLEMA',
                                    messaggio: `Sottoscorta: ${mat.tipo} ${mat.misura}. Riordino necessario!`,
                                    timestamp: Date.now()
                                }));
                            }
                        }
                    });

                    const nuova = new Commessa({
                        id: `COM-${Date.now()}`,
                        codice,
                        clienteId,
                        articolo,
                        descrizione,
                        dataConsegna,
                        priorita,
                        prezzoVendita: parseFloat(document.getElementById('prezzoVendita').value) || 0,
                        materiali,
                        tasks
                    });
                    this.state.commesse.push(nuova);
                    this.salvaSuLocalStorage();

                    if (tasks.length > 0) {
                        const primoTask = tasks[0];
                        this.aggiungiNotifica(new Notifica({
                            tipo: 'TASK_PRONTA',
                            messaggio: `Nuova task pronta: ${codice} - ${this.getMansioneNome(primoTask.mansioneId)}`,
                            dipendenteId: primoTask.dipendenteId,
                            taskId: primoTask.id
                        }));
                    }
                    this.mostraNotifica('Commessa creata con successo e magazzino aggiornato!', 'success');
                    this.navigate('commesse');
                } catch (e) {
                    console.error("Errore creazione commessa:", e);

                    return `

                                                    <div style="flex:1;">
                                                        <div style="font-weight:700; font-size:0.85rem;">${mat ? mat.tipo + ' ' + mat.misura : '<em>eliminato</em>'}</div>
                                                        <div style="font-size:0.72rem; color:var(--text-muted); margin-top:2px;">Q.tà: ${m.quantita} × € ${costoUnit.toFixed(2)}</div>
                                                    </div>
                                                    <div style="font-weight:800; font-size:0.95rem; flex-shrink:0; margin-left:12px;">€ ${costoTot.toFixed(2)}</div>
                                                </div>
                                            `;
                }).join('')}
                                        <div style="display:flex; justify-content:space-between; padding-top:14px; margin-top:4px; border-top:2px solid var(--border);">
                                            <span style="font-weight:900;">Totale Materiali</span>
                                            <span style="font-weight:900; color:var(--primary);">€ ${costoMateriali.toFixed(2)}</span>
                                        </div>
                                    </div>`}
                                </div>

                                <!-- Documentazione & Allegati -->
                                <div class="card" style="padding:24px;">
                                    <h3 style="margin:0 0 18px; font-size:0.8rem; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); font-weight:800; display:flex; justify-content:space-between; align-items:center;">
                                        📂 Documentazione
                                        <button class="btn btn-primary btn-small" style="padding:4px 8px; font-size:0.6rem;" onclick="document.getElementById('fileUpload').click()">➕ Aggiungi</button>
                                        <input type="file" id="fileUpload" style="display:none" onchange="app.caricaAllegato(this, '${c.id}')">
                                    </h3>
                                    ${(c.allegati || []).length === 0 ? `<p style="color:var(--text-muted); font-size:0.85rem; text-align:center; padding:20px; border:1px dashed var(--border); border-radius:12px;">Nessun documento allegato.</p>` : `
                                    <div style="display:flex; flex-direction:column; gap:10px;">
                                        ${c.allegati.map(a => `
                                            <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; background:var(--bg-body); border-radius:10px; border:1px solid var(--border-light);">
                                                <div style="display:flex; align-items:center; gap:10px; overflow:hidden;">
                                                    <span style="font-size:1.2rem;">${this.getIconaFile(a.nome)}</span>
                                                    <div style="overflow:hidden;">
                                                        <div style="font-weight:700; font-size:0.8rem; text-overflow:ellipsis; overflow:hidden; white-space:nowrap;">${a.nome}</div>
                                                        <div style="font-size:0.65rem; color:var(--text-muted);">${new Date(a.data).toLocaleDateString()}</div>
                                                    </div>
                                                </div>
                                                <div style="display:flex; gap:6px;">
                                                    <a href="${a.dataBase64}" download="${a.nome}" class="btn btn-secondary btn-small" style="padding:4px; font-size:0.8rem; border-radius:6px;">💾</a>
                                                    <button class="btn btn-danger btn-small" style="padding:4px; font-size:0.8rem; border-radius:6px;" onclick="app.eliminaAllegato('${c.id}', '${a.id}')">🗑️</button>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>`}
                                </div>
                            </div>

                            <!-- RIGHT: WORKFLOW OPERATIVO -->
                            <div class="card" style="padding:24px;">
                                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                                    <h3 style="margin:0; font-size:0.8rem; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); font-weight:800;">⚙️ Workflow Operativo</h3>
                                    <span style="font-size:0.75rem; color:var(--text-muted);">Auto-refresh ogni 30s</span>
                                </div>
                                <div style="display:flex; flex-direction:column; gap:12px;">
                                    ${c.tasks.length === 0 ? '<p style="text-align:center; color:var(--text-muted);">Nessuna fase definita.</p>' : c.tasks.map((t, i) => {
                    const dip = this.state.dipendenti.find(d => d.id === t.dipendenteId);
                    const man = this.state.mansioni.find(m => m.id === t.mansioneId);
                    const pagaDip = dip ? dip.pagaOraria : 20;
                    const costoMan = man ? man.costoOrario : 30;
                    const mins = (t.stato === 'COMPLETATA' && t.tempoImpiegato) ? t.tempoImpiegato : t.tempoStimato;
                    const costoTask = (mins / 60) * (pagaDip + costoMan);
                    const hh = s => String(Math.floor(s / 60)).padStart(2, '0') + 'h ' + String(s % 60).padStart(2, '0') + 'm';
                    const sc = statoTaskColors[t.stato] || statoTaskColors['BLOCCATA'];
                    const isActive = t.stato === 'IN_CORSO' || t.stato === 'PRONTA';
                    const initials = dip ? `${dip.nome[0]}${dip.cognome[0]}` : '?';
                    const dipColor = dip ? ['#6366f1', '#10b981', '#f59e0b', '#ec4899', '#06b6d4', '#8b5cf6', '#ef4444'][this.state.dipendenti.indexOf(dip) % 7] : '#94a3b8';

                    return `
                                            <div style="display:flex; gap:16px; padding:18px; border-radius:14px; background:${sc.bg}; border:2px solid ${sc.border}; position:relative; transition:all 0.2s;">
                                                <!-- Step Number -->
                                                <div style="width:36px; height:36px; border-radius:50%; background:${t.stato === 'COMPLETATA' ? 'var(--success)' : isActive ? sc.color : 'var(--border)'}; color:white; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:0.85rem; flex-shrink:0; margin-top:2px;">
                                                    ${t.stato === 'COMPLETATA' ? '✓' : i + 1}
                                                </div>
                                                <div style="flex:1; min-width:0;">
                                                    <!-- Row 1: Mansione + Badge -->
                                                    <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:10px;">
                                                        <div>
                                                            <div style="font-weight:800; font-size:0.95rem; color:var(--text-main);">${man ? man.nome : 'Mansione N/D'}</div>
                                                            <div style="font-size:0.75rem; color:var(--text-muted); margin-top:2px;">${(t.lavorazioniId || []).join(' · ') || '—'}</div>
                                                        </div>
                                                        <span style="padding:3px 10px; border-radius:20px; font-size:0.7rem; font-weight:800; background:${sc.bg}; color:${sc.color}; border:1px solid ${sc.border}; flex-shrink:0;">${t.stato.replace('_', ' ')}</span>
                                                    </div>
                                                    <!-- Row 2: Operator + Time + Cost -->
                                                    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;">
                                                        <div>
                                                            <div style="font-size:0.65rem; color:var(--text-muted); font-weight:800; margin-bottom:5px;">OPERATORE</div>
                                                            <div style="display:flex; align-items:center; gap:7px;">
                                                                <div style="width:28px; height:28px; border-radius:8px; background:${dipColor}; color:white; display:flex; align-items:center; justify-content:center; font-size:0.65rem; font-weight:900; flex-shrink:0;">${initials}</div>
                                                                <div style="font-size:0.82rem; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${dip ? dip.nome + ' ' + dip.cognome : '<em>N/A</em>'}</div>
                                                            </div>
                                                        </div>
                                                        <div>
                                                            <div style="font-size:0.65rem; color:var(--text-muted); font-weight:800; margin-bottom:5px;">${t.stato === 'COMPLETATA' ? 'TEMPO EFFETTIVO' : 'TEMPO STIMATO'}</div>
                                                            <div style="font-size:0.85rem; font-weight:700; color:${t.stato === 'COMPLETATA' ? 'var(--success)' : 'inherit'}">
                                                                ${t.stato === 'COMPLETATA' ? `✅ ${hh(t.tempoImpiegato || t.tempoStimato)}` : `⏳ ${hh(t.tempoStimato)}`}
                                                            </div>
                                                            ${t.stato === 'COMPLETATA' && t.tempoImpiegato ? `<div style="font-size:0.7rem; color:var(--text-muted);">Stimato: ${hh(t.tempoStimato)}</div>` : ''}
                                                        </div>
                                                        <div>
                                                            <div style="font-size:0.65rem; color:var(--text-muted); font-weight:800; margin-bottom:5px;">COSTO FASE</div>
                                                            <div style="font-size:0.85rem; font-weight:800; color:#f97316;">€ ${costoTask.toFixed(2)}</div>
                                                            <div style="font-size:0.68rem; color:var(--text-muted);">€${pagaDip}/h + €${costoMan}/h</div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        `;
                }).join('')}
                                </div>
                                <!-- Total Labor Cost -->
                                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:16px; padding:14px 16px; border-radius:10px; background:rgba(249,115,22,0.06); border:1px solid rgba(249,115,22,0.2);">
                                    <span style="font-weight:800; color:#f97316;">💼 Totale Costo Manodopera</span>
                                    <span style="font-weight:900; font-size:1.1rem; color:#f97316;">€ ${costoManodopera.toFixed(2)}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            renderCosti(container) {
                const commesse = this.state.commesse;
                const totalRevenue = commesse.reduce((sum, c) => sum + (c.prezzoVendita || 0), 0);

                const calculateCosts = (c) => {
                    const matCost = c.materiali.reduce((sum, m) => {
                        const mat = this.state.materiali.find(item => item.id === m.materialeId);
                        return sum + (mat ? mat.prezzo * m.quantita : 0);
                    }, 0);
                    const laborCost = c.tasks.reduce((sum, t) => {
                        if (t.stato !== 'COMPLETATA' && t.stato !== 'IN_CORSO') return sum;
                        const dip = this.state.dipendenti.find(d => d.id === t.dipendenteId);
                        const rate = dip ? dip.pagaOraria : 20; // fallback rate
                        const hours = (t.tempoImpiegato || t.tempoStimato) / 60;
                        return sum + (hours * rate);
                    }, 0);
                    return { materials: matCost, labor: laborCost, total: matCost + laborCost };
                };

                const globalCosts = commesse.reduce((acc, c) => {
                    const costs = calculateCosts(c);
                    acc.materials += costs.materials;
                    acc.labor += costs.labor;
                    return acc;
                }, { materials: 0, labor: 0 });

                const globalTotal = globalCosts.materials + globalCosts.labor;
                const globalMargin = totalRevenue - globalTotal;
                const globalROI = globalTotal > 0 ? (globalMargin / globalTotal * 100).toFixed(1) : 0;

                container.innerHTML = `
                    <div class="animate-fade-up">
                        <div class="stats-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px;">
                            <div class="card" style="background:var(--bg-body); border-left: 5px solid var(--primary);">
                                <div style="font-size:0.7rem; color:var(--text-muted); font-weight:800; text-transform:uppercase;">Valore Totale Ordini</div>
                                <div style="font-size:1.5rem; font-weight:900; margin-top:5px;">€ ${totalRevenue.toLocaleString()}</div>
                            </div>
                            <div class="card" style="background:var(--bg-body); border-left: 5px solid var(--error);">
                                <div style="font-size:0.7rem; color:var(--text-muted); font-weight:800; text-transform:uppercase;">Costi di Produzione</div>
                                <div style="font-size:1.5rem; font-weight:900; margin-top:5px;">€ ${globalTotal.toLocaleString()}</div>
                            </div>
                            <div class="card" style="background:var(--bg-body); border-left: 5px solid var(--success);">
                                <div style="font-size:0.7rem; color:var(--text-muted); font-weight:800; text-transform:uppercase;">Margine Operativo</div>
                                <div style="font-size:1.5rem; font-weight:900; margin-top:5px; color:var(--success)">€ ${globalMargin.toLocaleString()}</div>
                            </div>
                            <div class="card" style="background:var(--bg-body); border-left: 5px solid #6366f1;">
                                <div style="font-size:0.7rem; color:var(--text-muted); font-weight:800; text-transform:uppercase;">ROI Medio</div>
                                <div style="font-size:1.5rem; font-weight:900; margin-top:5px; color:#6366f1">${globalROI}%</div>
                            </div>
                        </div>

                        <div class="card" style="padding:0; overflow:hidden;">
                            <table class="mag-table">
                                <thead style="background:var(--bg-body)">
                                    <tr>
                                        <th>Codice</th>
                                        <th>Articolo</th>
                                        <th style="text-align:right">Costo Mat.</th>
                                        <th style="text-align:right">Costo Lav.</th>
                                        <th style="text-align:right">Valore</th>
                                        <th style="text-align:right">Margine</th>
                                        <th style="text-align:center">ROI</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${commesse.map(c => {
                    const costs = calculateCosts(c);
                    const margin = (c.prezzoVendita || 0) - costs.total;
                    const roi = costs.total > 0 ? (margin / costs.total * 100).toFixed(0) : 0;
                    return `
                                            <tr>
                                                <td><strong>${c.codice}</strong></td>
                                                <td>${c.articolo}</td>
                                                <td style="text-align:right">€ ${costs.materials.toFixed(2)}</td>
                                                <td style="text-align:right">€ ${costs.labor.toFixed(2)}</td>
                                                <td style="text-align:right; font-weight:700;">€ ${(c.prezzoVendita || 0).toFixed(2)}</td>
                                                <td style="text-align:right; font-weight:800; color:${margin >= 0 ? 'var(--success)' : 'var(--error)'}">
                                                    € ${margin.toFixed(2)}
                                                </td>
                                                <td style="text-align:center">
                                                    <span class="badge" style="background:${roi > 20 ? 'rgba(16, 185, 129, 0.1)' : 'rgba(239, 68, 68, 0.1)'}; color:${roi > 20 ? '#10b981' : '#ef4444'};">
                                                        ${roi}%
                                                    </span>
                                                </td>
                                            </tr>
                                        `;
                }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            },
            eliminaCommessa(id) {
                if (confirm('Eliminare la commessa?')) {
                    this.state.commesse = this.state.commesse.filter(c => c.id !== id);
                    this.salvaSuLocalStorage();
                    this.navigate('commesse');
                }
            },

            stampaCommessa(id) {
                window.print();
            },

            getIconaFile(nome) {
                const ext = nome.split('.').pop().toLowerCase();
                if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext)) return '🖼️';
                if (ext === 'pdf') return '📄';
                if (['xls', 'xlsx', 'csv'].includes(ext)) return '📊';
                if (['doc', 'docx', 'txt'].includes(ext)) return '📝';
                return '📁';
            },

            caricaAllegato(input, commessaId) {
                const file = input.files[0];
                if (!file) return;

                if (file.size > 2 * 1024 * 1024) {
                    this.mostraNotifica('Errore: Il file supera i 2MB (limite storage locale)', 'error');
                    return;
                }

                const reader = new FileReader();
                reader.onload = (e) => {
                    const commessa = this.state.commesse.find(c => c.id === commessaId);
                    if (commessa) {
                        if (!commessa.allegati) commessa.allegati = [];
                        commessa.allegati.push({
                            id: `ATT-${Date.now()}`,
                            nome: file.name,
                            tipo: file.type,
                            data: Date.now(),
                            dataBase64: e.target.result
                        });
                        this.salvaSuLocalStorage();
                        this.navigate('commessa-dettaglio', { id: commessaId });
                        this.mostraNotifica('File caricato correttamente', 'success');
                    }
                };
                reader.readAsDataURL(file);
            },

            eliminaAllegato(commessaId, allegatoId) {
                if (confirm('Rimuovere questo allegato?')) {
                    const commessa = this.state.commesse.find(c => c.id === commessaId);
                    if (commessa) {
                        commessa.allegati = commessa.allegati.filter(a => a.id !== allegatoId);
                        this.salvaSuLocalStorage();
                        this.navigate('commessa-dettaglio', { id: commessaId });
                        this.mostraNotifica('Allegato rimosso', 'info');
                    }
                }
            },

            modificaCommessa(id) {
                this.navigate('modifica-commessa');
                setTimeout(() => {
                    const select = document.getElementById('commessaSelect');
                    if (select) { select.value = id; this.caricaCommessaModifica(id); }
                }, 100);
            },

            renderTimeline(container) {
                container.innerHTML = `
                    <div class="mag-header">
                        <h2 class="section-title" style="margin-bottom:0">📈 Roadmap Operativa</h2>
                        <button class="btn btn-secondary btn-small" onclick="app.navigate('timeline')">🔄 Aggiorna</button>
                    </div>
                    <div class="timeline-grid" id="timelineGrid">
                        ${this.state.dipendenti.map(dip => this.renderEmployeeTimeline(dip)).join('')}
                    </div>
                `;
            },

            renderEmployeeTimeline(dip) {
                const tasks = [];
                this.state.commesse.forEach(comm => {
                    comm.tasks.forEach(t => {
                        if (t.dipendenteId === dip.id) {
                            tasks.push({ ...t, commessaCodice: comm.codice, commessaArticolo: comm.articolo });
                        }
                    });
                });

                const statusOrder = { 'IN_CORSO': 0, 'PRONTA': 1, 'BLOCCATA': 2, 'COMPLETATA': 3 };
                tasks.sort((a, b) => statusOrder[a.stato] - statusOrder[b.stato]);

                return `
                    <div class="emp-timeline-card">
                        <div class="emp-timeline-header">
                            <div class="emp-info">
                                <div class="emp-avatar">${dip.nome[0]}${dip.cognome[0]}</div>
                                <div class="emp-details">
                                    <h3>${dip.nome} ${dip.cognome}</h3>
                                    <span>${tasks.filter(t => t.stato === 'IN_CORSO').length} in corso / ${tasks.filter(t => t.stato !== 'COMPLETATA').length} totali</span>
                                </div>
                            </div>
                            <div class="badge badge-${tasks.some(t => t.stato === 'IN_CORSO') ? 'warning' : 'success'}">${tasks.some(t => t.stato === 'IN_CORSO') ? 'OCCUPATO' : 'LIBERO'}</div>
                        </div>
                        <div class="emp-tasks-list" data-dipendente-id="${dip.id}" ondragover="app.handleDragOver(event)" ondrop="app.handleDropTimeline(event)">
                            ${tasks.length === 0 ? `<div style="text-align:center; padding:30px; color:var(--text-muted); font-size:0.8rem; border:2px dashed var(--border); border-radius:12px; margin:10px;">Trascina qui un task</div>` :
                        tasks.map(t => {
                            const commID = this.getCommessaIdByTaskId(t.id);
                            const parentComm = this.state.commesse.find(c => c.id === commID);
                            return `
                                <div class="timeline-task-item ${t.stato.toLowerCase().replace('_', '-')}" draggable="true" ondragstart="app.handleDragStart(event)" ondragend="app.handleDragEnd(event)" data-task-id="${t.id}" data-commessa-id="${commID}">
                                    <div class="task-meta">
                                        <span class="task-code">${t.commessaCodice}</span>
                                        <div style="display:flex; gap:2px;">
                                            ${parentComm ? parentComm.tasks.map(pt => {
                                const ptColor = pt.id === t.id ? 'var(--primary)' : (pt.stato === 'COMPLETATA' ? 'var(--success)' : 'var(--border)');
                                return `<div style="width:6px; height:6px; border-radius:50%; background:${ptColor};" title="${this.getMansioneNome(pt.mansioneId)}"></div>`;
                            }).join('') : ''}
                                        </div>
                                        <span class="badge badge-${this.getBadgeType(t.stato)}" style="font-size:0.6rem; padding:2px 6px;">${t.stato}</span>
                                    </div>
                                    <div class="task-title">${this.getMansioneNome(t.mansioneId)}</div>
                                    <div class="task-article">${t.commessaArticolo}</div>
                                    
                                    <div class="reassign-box" style="margin: 10px 0;" onclick="event.stopPropagation()">
                                        <select class="form-control" onchange="app.cambiaDipendenteTask('${commID}', '${t.id}', this.value)" style="width: 100%; padding: 4px 8px; font-size:0.75rem; height:28px; border-radius:6px; background: var(--bg-body); color: var(--text-main); border: 1px solid var(--border);">
                                            <option value="">🔄 Riassegna...</option>
                                            ${this.renderDipendentiOptions(t.mansioneId, dip.id)}
                                        </select>
                                    </div>

                                    <div class="task-status-bar" style="border-top: 1px solid var(--border-light); padding-top:8px; margin-top:8px;">
                                        <span style="color:var(--primary)">⏱️ ${t.tempoImpiegato}/${t.tempoStimato}m</span>
                                        ${t.stato === 'IN_CORSO' ? `<span style="color:var(--warning); margin-left:auto;">⚡ In corso...</span>` : ''}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                        </div>
                    </div>
                `;
            },
            getCommessaIdByTaskId(taskId) {
                const comm = this.state.commesse.find(c => {
                    return c.tasks && c.tasks.some(t => t.id === taskId);
                });
                return comm ? comm.id : '';
            },

            renderTaskQueue(tasks, commessaId) {
                if (tasks.length === 0) return '<p style="color: var(--text-secondary); text-align: center;">Nessun task attivo</p>';
                return tasks.sort((a, b) => (a.ordine || 0) - (b.ordine || 0)).map(task => `
                    <div class="task-card-drag" draggable="true" data-task-id="${task.id}" data-commessa-id="${commessaId}" data-mansione="${task.mansioneId}" style="border-left-color: ${this.getTaskColor(task.stato)};">
                        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                            <span class="task-order-badge">${task.ordine}</span>
                            <strong style="color: var(--primary); flex:1;">${this.getMansioneNome(task.mansioneId)}</strong>
                            <span class="badge badge-${this.getBadgeType(task.stato)}">${task.stato}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-size: 13px; color: var(--text-secondary);">
                            <span>👤 ${this.getDipendenteNome(task.dipendenteId) || 'Nessuno'}</span>
                            <span>⏱️ ${task.tempoImpiegato}/${task.tempoStimato} min</span>
                        </div>
                        <div style="margin-top: 10px;" onclick="event.stopPropagation()">
                            <select class="dipendente-select" onchange="app.cambiaDipendenteTask('${commessaId}', '${task.id}', this.value)" style="width: 100%; padding: 8px; background: var(--dark-border); border: 1px solid var(--primary); border-radius: 5px; color: white;">
                                <option value="">Seleziona dipendente...</option>
                                ${this.renderDipendentiOptions(task.mansioneId, task.dipendenteId)}
                            </select>
                            ${this.getValidazioneMessage(task.mansioneId, task.dipendenteId)}
                        </div>
                    </div>
                `).join('');
            },

            getTaskColor(stato) {
                switch (stato) {
                    case 'PRONTA': return 'var(--secondary)';
                    case 'IN_CORSO': return 'var(--warning)';
                    case 'BLOCCATA': return 'var(--error)';
                    default: return 'var(--primary)';
                }
            },
            getBadgeType(stato) {
                switch (stato) {
                    case 'PRONTA': return 'success';
                    case 'IN_CORSO': return 'warning';
                    case 'BLOCCATA': return 'error';
                    default: return 'primary';
                }
            },

            renderDipendentiOptions(mansioneId, currentDipendenteId) {
                const mansione = this.state.mansioni.find(m => m.id === mansioneId);
                if (!mansione) return '';
                const qualificati = this.state.dipendenti.filter(d => d.mansioniId.includes(mansioneId));
                const nonQualificati = this.state.dipendenti.filter(d => !d.mansioniId.includes(mansioneId));
                let options = '';
                qualificati.forEach(d => {
                    const selected = d.id === currentDipendenteId ? 'selected' : '';
                    options += `<option value="${d.id}" ${selected} style="color: var(--success);">✅ ${d.nome} ${d.cognome} (carico: ${d.getCaricoLavoro(this.state.commesse)})</option>`;
                });
                if (nonQualificati.length > 0) {
                    options += '<option disabled>──────────</option>';
                    nonQualificati.forEach(d => {
                        const selected = d.id === currentDipendenteId ? 'selected' : '';
                        options += `<option value="${d.id}" ${selected} style="color: var(--warning);">⚠️ ${d.nome} ${d.cognome} (non qualificato)</option>`;
                    });
                }
                return options;

                                        <div><h3 style="margin:0; font-size:1rem;">${d.nome} ${d.cognome}</h3><span style="font-size:0.7rem; color:var(--text-muted)">€${d.pagaOraria}/h</span></div>

                                    ${d.mansioniId.map(mid => `<span class="badge badge-secondary" style="font-size:0.6rem">${this.getMansioneNome(mid)}</span>`).join('')}
                                </div>
                                <div style="display:flex; gap:8px;">
                                    <button class="btn btn-secondary btn-small" style="flex:1" onclick="app.modificaDipendente('${d.id}')">Modifica</button>
                                    <button class="btn btn-danger btn-small" onclick="app.eliminaDipendente('${d.id}')">🗑️</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            },
            filterDipendentiCards(val) {
                document.querySelectorAll('.dipendente-card').forEach(c => {
                    c.style.display = c.dataset.nome.toLowerCase().includes(val.toLowerCase()) ? 'block' : 'none';
                });
            },
            aggiungiDipendente() { this.currentDipendenteId = null; this.navigate('modifica-dipendente'); },
            modificaDipendente(id) { this.currentDipendenteId = id; this.navigate('modifica-dipendente'); },
            renderModificaDipendente(container, id) {
                const dip = this.state.dipendenti.find(d => d.id === id) || { nome: '', cognome: '', pagaOraria: 20, mansioniId: [] };
                container.innerHTML = `
                    <div class="mag-header"><h2 class="section-title">${id ? '✏️ Modifica' : '➕ Nuovo'} Dipendente</h2></div>
                    <div class="card" style="max-width:500px; margin:20px auto; padding:30px;">
                        <form onsubmit="app.salvaDipendente(event, '${id || ''}')">
                            <div class="form-group"><label>Nome</label><input type="text" name="nome" class="form-control" value="${dip.nome}" required></div>
                            <div class="form-group"><label>Cognome</label><input type="text" name="cognome" class="form-control" value="${dip.cognome}" required></div>
                            <div class="form-group"><label>Paga Oraria (€/h)</label><input type="number" name="paga" class="form-control" value="${dip.pagaOraria}" required></div>

                                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;">
                                    ${this.state.mansioni.map(m => `<label style="font-size:0.8rem"><input type="checkbox" name="mids" value="${m.id}" ${dip.mansioniId.includes(m.id) ? 'checked' : ''}> ${m.nome}</label>`).join('')}

                        </form>
                    </div>

            },
            salvaDipendente(e, id) {
                e.preventDefault();
                const fd = new FormData(e.target);
                const data = { nome: fd.get('nome'), cognome: fd.get('cognome'), pagaOraria: parseFloat(fd.get('paga')), mansioniId: fd.getAll('mids') };
                if (id) Object.assign(this.state.dipendenti.find(d => d.id === id), data);

                this.navigate('dipendenti');

            eliminaDipendente(id) { if (confirm('Eliminare?')) { this.state.dipendenti = this.state.dipendenti.filter(d => d.id !== id); this.salvaSuLocalStorage(); this.renderDipendenti(document.getElementById('main-content')); } },

                            </div>

                                <div style="font-size:2rem; font-weight:900; color:var(--secondary);">${dipQualificatiCount}</div>
                                <div style="font-size:0.7rem; font-weight:800; text-transform:uppercase; color:var(--text-muted);">Operatori Team</div>
                            </div>
                        </div>

                        <!-- CARDS MANSIONI -->
                        ${this.state.mansioni.length === 0 ? `
                            <div class="card" style="padding:60px; text-align:center; color:var(--text-muted);">
                                <div style="font-size:3rem; margin-bottom:16px;">🛠️</div>
                                <h3>Nessuna lavorazione configurata</h3>
                                <p>Aggiungi la prima mansione per iniziare a pianificare le commesse</p>
                                <button class="btn btn-primary" onclick="app.apriModalMansione(null)" style="margin-top:20px; border-radius:40px;">➕ Crea Prima Lavorazione</button>
                            </div>
                        ` : `
                            <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:20px;">
                                ${this.state.mansioni.map(m => {
                    const diff = difficoltaMap[m.difficolta] || difficoltaMap['MEDIA'];
                    const dipAssegnati = this.state.dipendenti.filter(d => d.mansioniId && d.mansioniId.includes(m.id));
                    return `
                                        <div class="card mansione-card" style="padding:0; overflow:hidden; cursor:pointer; transition:transform 0.2s, box-shadow 0.2s; border-top:4px solid ${diff.color};"
                                             onmouseenter="this.style.transform='translateY(-4px)'; this.style.boxShadow='0 12px 32px rgba(0,0,0,0.12)'"
                                             onmouseleave="this.style.transform=''; this.style.boxShadow=''">
                                            <div style="padding:24px;">

                                                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px;">

                                                            <span style="font-size:1.1rem;">${diff.icon}</span>
                                                            <span class="badge" style="background:${diff.bg}; color:${diff.color}; border:1px solid ${diff.color}; font-size:0.6rem; font-weight:800;">${diff.label}</span>
                                                        </div>
                                                        <h3 style="margin:0; font-size:1.2rem; font-weight:900; letter-spacing:-0.02em;">${m.nome}</h3>
                                                        ${m.descrizione ? `<p style="margin:6px 0 0; font-size:0.8rem; color:var(--text-muted); line-height:1.4;">${m.descrizione}</p>` : ''}

                                                <!-- Parametri -->
                                                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;">

                                                        <div style="font-size:1.3rem; font-weight:900; color:var(--primary);">€${m.costoOrario || 0}</div>
                                                        <div style="font-size:0.65rem; font-weight:700; text-transform:uppercase; color:var(--text-muted);">Costo / ora</div>
                                                    </div>
                                                    <div style="background:var(--bg-body); border-radius:12px; padding:12px; text-align:center;">
                                                        <div style="font-size:1.3rem; font-weight:900; color:var(--warning);">${m.tempoMedio || 0}'</div>
                                                        <div style="font-size:0.65rem; font-weight:700; text-transform:uppercase; color:var(--text-muted);">Tempo Medio</div>
                                                    </div>
                                                </div>

                                                <!-- Operatori qualificati -->
                                                <div style="margin-bottom:16px;">
                                                    <div style="font-size:0.65rem; font-weight:800; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px;">Operatori Qualificati (${dipAssegnati.length})</div>

                                                        ${dipAssegnati.length > 0
                            ? dipAssegnati.map(d => `
                                                                <div style="display:flex; align-items:center; gap:6px; background:var(--primary-soft); border-radius:40px; padding:4px 12px;">
                                                                    <div style="width:20px; height:20px; border-radius:50%; background:var(--primary); color:white; font-size:0.6rem; font-weight:800; display:flex; align-items:center; justify-content:center;">${d.nome[0]}${d.cognome[0]}</div>
                                                                    <span style="font-size:0.75rem; font-weight:600;">${d.nome}</span>
                                                                </div>
                                                            `).join('')
                            : `<span style="font-size:0.75rem; color:var(--text-muted); font-style:italic;">Nessun operatore qualificato</span>`
                        }
                                                    </div>
                                                </div>

                                                <!-- Footer azioni -->
                                                <div style="display:flex; gap:10px; border-top:1px solid var(--border); padding-top:16px;">
                                                    <button class="btn btn-secondary btn-small" style="flex:1; border-radius:40px;" onclick="app.apriModalMansione('${m.id}')">✏️ Modifica</button>
                                                    <button class="btn btn-danger btn-small" style="border-radius:40px;" onclick="event.stopPropagation(); app.eliminaMansione('${m.id}')">🗑️</button>
                                                </div>
                                            </div>
                                        </div>
                                    `;
                }).join('')}
                            </div>
                        `}
                    </div>
                `;
            },

            apriModalMansione(id) {
                const m = id ? this.state.mansioni.find(x => x.id === id) : null;
                const existing = document.getElementById('modal-mansione');
                if (existing) existing.remove();

                const backdrop = document.createElement('div');
                backdrop.className = 'modal-backdrop';
                backdrop.id = 'modal-mansione';
                backdrop.style.display = 'flex';
                backdrop.innerHTML = `
                    <div class="modal-content" style="max-width:580px; padding:0; overflow:hidden; position:relative;">
                        <!-- Header modale -->
                        <div style="padding:28px 32px; background:linear-gradient(135deg,var(--primary-soft),transparent); border-bottom:1px solid var(--border);">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <div>
                                    <h2 style="margin:0; font-weight:900; font-size:1.4rem;">${m ? '✏️ Modifica Lavorazione' : '🛠️ Nuova Lavorazione'}</h2>
                                    <p style="margin:4px 0 0; font-size:0.8rem; color:var(--text-muted);">${m ? `Stai modificando: ${m.nome}` : 'Configura i parametri della nuova mansione'}</p>
                                </div>
                                <button onclick="document.getElementById('modal-mansione').remove()" style="background:none; border:none; font-size:1.5rem; cursor:pointer; color:var(--text-muted); line-height:1;">✕</button>
                            </div>
                        </div>

                        <div style="padding:28px 32px;">
                            <!-- Nome -->
                            <div class="form-group" style="margin-bottom:20px;">
                                <label class="form-label" style="font-weight:800;">Nome Lavorazione *</label>
                                <input type="text" id="man-nome" class="form-control" placeholder="Es. Saldatura MIG, Taglio Plasma, Verniciatura..." value="${m ? m.nome : ''}" style="font-weight:700;">
                            </div>

                            <!-- Descrizione -->
                            <div class="form-group" style="margin-bottom:20px;">
                                <label class="form-label" style="font-weight:800;">Descrizione / Note operative</label>
                                <textarea id="man-desc" class="form-control" placeholder="Descrivi il processo, requisiti di sicurezza, attrezzatura necessaria..." style="min-height:80px; resize:vertical;">${m ? (m.descrizione || '') : ''}</textarea>
                            </div>

                            <!-- Parametri numerici  -->
                            <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px;">
                                <div class="form-group">
                                    <label class="form-label" style="font-weight:800;">💰 Costo Orario (€/h)</label>
                                    <input type="number" id="man-costo" class="form-control" placeholder="Es. 35.00" value="${m ? (m.costoOrario || '') : ''}" step="0.5" min="0">
                                </div>
                                <div class="form-group">
                                    <label class="form-label" style="font-weight:800;">⏱️ Tempo Medio (min)</label>
                                    <input type="number" id="man-tempo" class="form-control" placeholder="Es. 120" value="${m ? (m.tempoMedio || '') : ''}" min="1">
                                </div>
                            </div>

                            <!-- Difficoltà (selezione grafica) -->
                            <div class="form-group" style="margin-bottom:24px;">
                                <label class="form-label" style="font-weight:800; margin-bottom:12px; display:block;">🎯 Livello di Difficoltà</label>
                                <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px;" id="diff-selector">
                                    ${[
                        { val: 'BASSA', icon: '🟢', label: 'Bassa', color: 'var(--success)' },
                        { val: 'MEDIA', icon: '🟡', label: 'Media', color: 'var(--warning)' },
                        { val: 'ALTA', icon: '🔴', label: 'Alta', color: 'var(--error)' },
                        { val: 'URGENTE', icon: '⚡', label: 'Urgente', color: '#a855f7' }
                    ].map(d => `
                                        <div class="diff-option" data-val="${d.val}" onclick="app.selezionaDifficolta('${d.val}')"
                                             style="padding:14px 8px; border-radius:14px; border:2px solid ${(m?.difficolta || 'MEDIA') === d.val ? d.color : 'var(--border)'}; 
                                                    background:${(m?.difficolta || 'MEDIA') === d.val ? `${d.color}22` : 'var(--bg-body)'};
                                                    text-align:center; cursor:pointer; transition:all 0.2s;">
                                            <div style="font-size:1.4rem;">${d.icon}</div>
                                            <div style="font-size:0.7rem; font-weight:800; margin-top:4px; color:${(m?.difficolta || 'MEDIA') === d.val ? d.color : 'var(--text-muted)'};">${d.label}</div>
                                        </div>
                                    `).join('')}
                                </div>
                                <input type="hidden" id="man-diff" value="${m ? (m.difficolta || 'MEDIA') : 'MEDIA'}">
                            </div>

                            <!-- Bottoni -->
                            <div style="display:flex; gap:12px; margin-top:8px;">
                                <button class="btn btn-secondary" style="flex:1; border-radius:40px;" onclick="document.getElementById('modal-mansione').remove()">Annulla</button>
                                <button class="btn btn-primary" style="flex:2; border-radius:40px; font-weight:800;" onclick="app.salvaMansione('${m ? m.id : ''}')">
                                    ${m ? '💾 Aggiorna Lavorazione' : '✅ Crea Lavorazione'}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                document.body.appendChild(backdrop);
                document.getElementById('man-nome').focus();
            },

            selezionaDifficolta(val) {
                document.getElementById('man-diff').value = val;
                const colors = { 'BASSA': 'var(--success)', 'MEDIA': 'var(--warning)', 'ALTA': 'var(--error)', 'URGENTE': '#a855f7' };
                document.querySelectorAll('.diff-option').forEach(el => {
                    const isSelected = el.dataset.val === val;
                    const c = colors[el.dataset.val];
                    el.style.border = `2px solid ${isSelected ? c : 'var(--border)'}`;
                    el.style.background = isSelected ? `${c}22` : 'var(--bg-body)';
                    el.querySelector('div:last-child').style.color = isSelected ? c : 'var(--text-muted)';
                });
            },

            salvaMansione(id) {
                const nome = document.getElementById('man-nome').value.trim();
                if (!nome) { this.mostraNotifica('Il nome della lavorazione è obbligatorio', 'error'); return; }
                const data = {
                    nome,
                    descrizione: document.getElementById('man-desc').value.trim(),
                    costoOrario: parseFloat(document.getElementById('man-costo').value) || 0,
                    tempoMedio: parseInt(document.getElementById('man-tempo').value) || 0,
                    difficolta: document.getElementById('man-diff').value || 'MEDIA'
                };
                if (id) {
                    const man = this.state.mansioni.find(m => m.id === id);
                    if (man) Object.assign(man, data);
                    this.mostraNotifica(`✅ Lavorazione "${nome}" aggiornata`, 'success');
                } else {
                    this.state.mansioni.push(new Mansione({ ...data, id: 'MAN-' + Date.now() }));
                    this.mostraNotifica(`✅ Lavorazione "${nome}" creata`, 'success');
                }
                this.salvaSuLocalStorage();
                document.getElementById('modal-mansione').remove();
                this.renderMansioni(document.getElementById('main-content'));
            },

            eliminaMansione(id) {
                const m = this.state.mansioni.find(x => x.id === id);
                if (!m) return;
                if (confirm(`Eliminare la lavorazione "${m.nome}"?\nQuesta azione non può essere annullata.`)) {
                    this.state.mansioni = this.state.mansioni.filter(x => x.id !== id);
                    this.salvaSuLocalStorage();
                    this.renderMansioni(document.getElementById('main-content'));
                    this.mostraNotifica(`Lavorazione eliminata`, 'warning');
                }
            },

            // ==================== NUOVO MAGAZZINO INDUSTRIALE V3 ====================
            renderMagazzino(container) {
                const tipiMetallo = [
                    { id: 'INOX', label: 'ACCIAIO INOX', icon: '🔩', color: '#6366f1' },
                    { id: 'FERRO', label: 'FERRO', icon: '🔧', color: '#f97316' },
                    { id: 'ALLUMINIO', label: 'ALLUMINIO', icon: '⚡', color: '#06b6d4' },
                    { id: 'OTTONE', label: 'OTTONE', icon: '✨', color: '#eab308' }
                ];

                const forme = [

            aggiungiRigaTaglio() {

            calcolaTaglio() {
                const barLength = parseFloat(document.getElementById('barLength').value);
                if (!barLength || barLength <= 0) { this.mostraNotifica('Lunghezza barra non valida', 'error'); return; }

                const rows = document.querySelectorAll('#piecesList .piece-row');
                const pieces = [];
                for (let row of rows) {
                    const length = parseFloat(row.querySelector('.piece-length').value);
                    const qty = parseInt(row.querySelector('.piece-qty').value);
                    if (length > 0 && length <= barLength && qty > 0) {
                        for (let i = 0; i < qty; i++) pieces.push(length);
                    } else if (length > barLength) {
                        this.mostraNotifica(`Pezzo da ${length}mm supera la lunghezza barra (${barLength}mm)`, 'error');
                        return;
                    }
                }

                if (pieces.length === 0) { this.mostraNotifica('Inserisci almeno un pezzo da tagliare', 'error'); return; }

                // Algoritmo Best-Fit Decreasing
                pieces.sort((a, b) => b - a);
                const bins = [];
                for (let piece of pieces) {
                    let bestFitIndex = -1;
                    let bestRemaining = barLength + 1;
                    for (let i = 0; i < bins.length; i++) {
                        if (bins[i].remaining >= piece && bins[i].remaining - piece < bestRemaining) {
                            bestRemaining = bins[i].remaining - piece;
                            bestFitIndex = i;
                        }
                    }
                    if (bestFitIndex !== -1) {
                        bins[bestFitIndex].pieces.push(piece);
                        bins[bestFitIndex].remaining -= piece;
                    } else {
                        bins.push({ pieces: [piece], remaining: barLength - piece });
                    }
                }

                const totalMaterial = pieces.reduce((a, b) => a + b, 0);
                const totalWaste = (bins.length * barLength) - totalMaterial;
                const efficiency = ((totalMaterial / (bins.length * barLength)) * 100).toFixed(1);

                let html = `
                    <div class="card" style="padding:0; overflow:hidden; border:2px solid var(--success);">
                        <div style="padding:24px; background:linear-gradient(135deg,rgba(16,185,129,0.1),transparent); border-bottom:2px solid var(--success);">
                            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px;">
                                <div>
                                    <h3 style="margin:0; font-weight:900; font-size:1.5rem;">✅ Risultato Ottimizzazione</h3>
                                    <p style="margin:4px 0 0; color:var(--text-muted); font-size:0.85rem;">Algoritmo Best-Fit Decreasing</p>
                                </div>
                                <div style="text-align:right;">
                                    <div style="font-size:2.5rem; font-weight:900; color:var(--success); line-height:1;">${bins.length}</div>
                                    <div style="font-size:0.7rem; font-weight:800; text-transform:uppercase; color:var(--text-muted);">Barre Totali</div>
                                </div>
                            </div>
                        </div>
                        <div style="padding:24px;">
                            <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:32px;">
                                <div style="background:var(--bg-body); border-radius:16px; padding:16px; text-align:center;">
                                    <div style="font-size:1.8rem; font-weight:900; color:var(--primary);">${totalMaterial.toLocaleString()}</div>
                                    <div style="font-size:0.7rem; font-weight:800; text-transform:uppercase; color:var(--text-muted);">mm Utilizzati</div>
                                </div>
                                <div style="background:var(--bg-body); border-radius:16px; padding:16px; text-align:center;">
                                    <div style="font-size:1.8rem; font-weight:900; color:var(--warning);">${totalWaste.toLocaleString()}</div>
                                    <div style="font-size:0.7rem; font-weight:800; text-transform:uppercase; color:var(--text-muted);">mm Scarto</div>
                                </div>
                                <div style="background:var(--bg-body); border-radius:16px; padding:16px; text-align:center;">
                                    <div style="font-size:1.8rem; font-weight:900; color:var(--success);">${efficiency}%</div>
                                    <div style="font-size:0.7rem; font-weight:800; text-transform:uppercase; color:var(--text-muted);">Efficienza</div>
                                </div>
                            </div>
                            <h4 style="font-weight:800; margin-bottom:16px;">📦 Dettaglio Tagli per Barra</h4>
                            <div style="display:flex; flex-direction:column; gap:12px;">
                `;

                bins.forEach((bin, idx) => {
                    const waste = bin.remaining;
                    const wasteP = (waste / barLength * 100).toFixed(1);
                    const barEff = ((1 - waste / barLength) * 100).toFixed(1);
                    html += `
                        <div class="accordion-item" style="margin-bottom:0; border-left:4px solid ${waste < 100 ? 'var(--success)' : 'var(--warning)'};">
                            <div class="accordion-header" onclick="this.nextElementSibling.classList.toggle('show')">
                                <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
                                    <span style="font-weight:900; background:var(--primary-soft); padding:4px 12px; border-radius:20px; font-size:0.8rem;">Barra ${idx + 1}</span>
                                    <div style="width:150px; height:8px; background:var(--border); border-radius:4px; overflow:hidden;">
                                        <div style="width:${barEff}%; height:100%; background:${waste < 100 ? 'var(--success)' : 'var(--warning)'}; border-radius:4px;"></div>
                                    </div>
                                    <span class="badge badge-${waste < 100 ? 'success' : 'warning'}" style="font-size:0.7rem;">Scarto: ${waste} mm (${wasteP}%)</span>
                                </div>
                                <span style="font-size:1.2rem;">⌄</span>
                            </div>
                            <div class="accordion-content">
                                <div style="background:var(--bg-body); border-radius:12px; padding:16px;">
                                    <div style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px;">
                                        ${bin.pieces.map(p => `<div style="background:linear-gradient(135deg,var(--primary),var(--primary-hover)); color:white; padding:8px 16px; border-radius:40px; font-weight:700; font-size:0.9rem;">📏 ${p} mm</div>`).join('')}
                                        ${waste > 0 ? `<div style="background:rgba(245,158,11,0.15); border:1px solid var(--warning); color:var(--warning); padding:8px 16px; border-radius:40px; font-weight:700; font-size:0.9rem;">🗑️ Scarto: ${waste} mm</div>` : ''}
                                    </div>
                                    <div style="font-size:0.7rem; color:var(--text-muted); border-top:1px solid var(--border); padding-top:12px;">Utilizzati: ${bin.pieces.reduce((a, b) => a + b, 0)} mm / ${barLength} mm</div>
                                </div>
                            </div>
                        </div>
                    `;
                });

                html += `
                            </div>
                            <div style="margin-top:32px; padding:20px; background:var(--bg-body); border-radius:16px; border:1px solid var(--border);">
                                <div style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:16px; align-items:center;">
                                    <div style="display:flex; align-items:center; gap:12px;">
                                        <span style="font-size:1.8rem;">📊</span>
                                        <div><div style="font-weight:800;">Riepilogo Materiale</div><div style="font-size:0.75rem; color:var(--text-muted);">${pieces.length} pezzi da tagliare</div></div>
                                    </div>
                                    <div style="display:flex; gap:24px; flex-wrap:wrap; font-size:0.9rem;">
                                        <div><b>Barre:</b> ${bins.length}</div>
                                        <div><b>Metri totali:</b> ${(bins.length * barLength / 1000).toFixed(2)} m</div>
                                        <div><b>Utilizzati:</b> ${(totalMaterial / 1000).toFixed(2)} m</div>
                                        <div style="color:var(--warning);"><b>Scarto:</b> ${(totalWaste / 1000).toFixed(2)} m</div>
                                    </div>
                                </div>
                            </div>
                            <div style="margin-top:24px; display:flex; gap:16px; justify-content:flex-end;">
                                <button class="btn btn-secondary btn-small" onclick="app.stampaTaglio()" style="border-radius:40px; padding:10px 24px;">🖨️ Stampa Report</button>
                                <button class="btn btn-primary btn-small" onclick="app.esportaTaglioCSV()" style="border-radius:40px; padding:10px 24px;">📎 Esporta CSV</button>
                            </div>
                        </div>
                    </div>
                `;

                this.lastTaglioResult = { bins, barLength, totalMaterial, totalWaste, efficiency, piecesCount: pieces.length };
                const resultDiv = document.getElementById('taglioResult');
                resultDiv.innerHTML = html;
                if (typeof gsap !== 'undefined') gsap.fromTo(resultDiv, { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.4, ease: 'power2.out' });
                resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
            },

            stampaTaglio() {
                const resultDiv = document.getElementById('taglioResult');
                if (!resultDiv || !resultDiv.innerHTML.trim()) {
                    this.mostraNotifica('Calcola prima l\'ottimizzazione', 'warning');
                    return;
                }
                const w = window.open('', '_blank');
                w.document.write(`<!DOCTYPE html><html><head><title>Taglio Barre - Report</title>
                    <style>body{font-family:system-ui,sans-serif;padding:32px;color:#111} h1{font-size:1.5rem} table{border-collapse:collapse;width:100%} th,td{border:1px solid #ccc;padding:8px 12px;text-align:left} th{background:#f5f5f5} @media print{.no-print{display:none}}</style>
                    </head><body>${resultDiv.innerHTML}</body></html>`);
                w.document.close();
                setTimeout(() => w.print(), 500);
            },

            esportaTaglioCSV() {
                if (!this.lastTaglioResult) { this.mostraNotifica('Nessun calcolo da esportare', 'warning'); return; }
                const { bins, barLength, totalMaterial, totalWaste, efficiency } = this.lastTaglioResult;
                let csv = 'RAPPORTO OTTIMIZZAZIONE TAGLIO BARRE\n';
                csv += `Data,${new Date().toLocaleString('it-IT')}\n`;
                csv += `Lunghezza Barra Standard (mm),${barLength}\n`;
                csv += `Numero Barre Necessarie,${bins.length}\n`;
                csv += `Efficienza,${efficiency}%\n`;
                csv += `Materiale Utilizzato (mm),${totalMaterial}\n`;
                csv += `Scarto Totale (mm),${totalWaste}\n\n`;
                csv += 'Barra,Pezzi (mm),Scarto (mm),Totale Usato (mm)\n';
                bins.forEach((bin, idx) => {
                    csv += `Barra ${idx + 1},"${bin.pieces.join(' | ')}",${bin.remaining},${bin.pieces.reduce((a, b) => a + b, 0)}\n`;
                });
                const ts = new Date().toISOString().replace(/[:\-T]/g, '').slice(0, 14);
                const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `TaglioBarre_${ts}.csv`;
                a.click(); URL.revokeObjectURL(url);
                this.mostraNotifica(`✅ CSV esportato: ${bins.length} barre`, 'success');
            },

            renderMagTable(materials, color) {
                if (materials.length === 0) return `<div style="text-align:center; padding:60px; color:var(--text-muted);">Nessun materiale trovato per questa selezione.</div>`;

                return `
                    <table class="mag-table">
                        <thead>
                            <tr style="background:${color}08">
                                <th style="color:${color}">Descrizione / Misura</th>
                                <th style="color:${color}">Tipologia</th>
                                <th style="color:${color}; text-align:center">Stock Pezzi</th>
                                <th style="color:${color}">Stato</th>
                                <th style="text-align:right">Azioni</th>
                            </tr>

            salvaNuovoMateriale() {
                try {
                    const metalloSelect = document.getElementById('new-metallo');
                    const sezioneSelect = document.getElementById('new-sezione');
                    const formaSelect = document.getElementById('new-forma');

                    if (!metalloSelect || !sezioneSelect) return;

                    const metallo = metalloSelect.value;
                    const sezione = sezioneSelect.value;
                    const forma = formaSelect ? formaSelect.value : '-';

                    let misura = '';
                    const misuraAltEl = document.getElementById('new-misura-alt');
                    if (misuraAltEl) {
                        misura = misuraAltEl.value;
                    } else {
                        if (forma === 'TONDO') {
                            const d = document.getElementById('par-diam')?.value;
                            const s = document.getElementById('par-sp')?.value;
                            misura = `Ø ${d}${s ? ' sp.' + s : ''}`;
                        } else if (forma === 'QUADRO') {
                            const l = document.getElementById('par-lato')?.value;
                            const s = document.getElementById('par-sp')?.value;
                            misura = `${l}x${l}${s ? ' sp.' + s : ''}`;
                        } else if (forma === 'RETTANGOLO') {
                            const b = document.getElementById('par-b')?.value;
                            const h = document.getElementById('par-h')?.value;
                            const s = document.getElementById('par-sp')?.value;
                            misura = `${b}x${h}${s ? ' sp.' + s : ''}`;
                        } else if (forma === 'ESAGONALE') {
                            misura = `ES. ${document.getElementById('par-diam')?.value}`;
                        }
                    }

                    if (!misura || misura.includes('undefined')) throw new Error('Dati incompleti');

                    const verga = parseFloat(document.getElementById('par-verga')?.value || 6);
                    const qtyPezzi = parseFloat(document.getElementById('par-qty')?.value || 1);

                    const nuovo = new Materiale({
                        id: `MAT-${Date.now()}`,
                        tipo: metallo,
                        sezione: sezione,
                        tipoSezione: forma,
                        misura: misura,
                        quantitaMagazzino: verga * qtyPezzi,
                        lunghezzaVerga: verga
                    });

                    this.state.materiali.push(nuovo);
                    this.salvaSuLocalStorage();
                    this.chiudiModal();

                    // Persistence
                    this.lastMagTab = metallo === 'ACCIAIO INOX' ? 'INOX' : metallo.split(' ')[0];
                    this.lastMagShape = sezione;

                    this.renderMagazzino(document.getElementById('main-content'));
                    this.mostraNotifica('Materiale aggiunto: ' + misura, 'success');
                } catch (e) {
                    alert('Errore: ' + e.message);
                }
            },

                // Map tasks to include commessa info

                this.state.commesse.forEach(c => {
